version: '3.8'

services:
  # 1. Unified App (FastAPI + React Frontend)
  app:
    build: 
      context: ./project
    ports:
      - "8000:8000"
    volumes:
      - ./project/models:/app/models
    environment:
      - PREFECT_API_URL=http://prefect:4200/api
    depends_on:
      prefect:
        condition: service_healthy

  # 2. Prefect Server (Orchestration)
  prefect:
    image: prefecthq/prefect:2-python3.11
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4200/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Training Service
  training:
    build: 
      context: ./project
    volumes:
      - ./project/models:/app/models
      - ./data:/data
    environment:
      - PREFECT_API_URL=http://prefect:4200/api
    command: python pipeline/prefect_flow.py
    depends_on:
      prefect:
        condition: service_healthy
