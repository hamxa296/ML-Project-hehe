services:

  # ── Prefect Orchestration Server ────────────────────────────────────────────
  prefect:
    image: prefecthq/prefect:2-python3.11
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0
    environment:
      - TZ=Asia/Karachi
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── ML Pipeline Runner ───────────────────────────────────────────────────────
  # Trains the model, evaluates it, writes artifacts, then exits (one-shot).
  # depends_on only waits for container START not completion, so the API
  # uses /reload_model and /graph_list polling to pick up new artifacts.
  pipeline:
    build: .
    command: python pipeline/prefect_flow.py
    depends_on:
      prefect:
        condition: service_healthy
    environment:
      - PREFECT_API_URL=http://prefect:4200/api
      - TZ=Asia/Karachi
      - PYTHONPATH=/app
      - SMTP_SERVER=smtp.gmail.com
      - SMTP_PORT=587
      - SENDER_EMAIL=hamzzarif296@gmail.com
      - SENDER_PASSWORD=zmtvybdauhrhdnxl
      - RECIPIENT_EMAIL=ammarbatman9@gmail.com
    volumes:
      - ./src:/app/src                # Mount local model code
      - ./pipeline:/app/pipeline      # Mount local pipeline scripts
      - ./models:/app/models          # trained .pkl files (shared with api)
      - ./results:/app/results        # graphs dir (shared with api)
      - ./data:/app/data              # read-only input CSVs
      - ./artifacts:/app/artifacts

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - prefect
    environment:
      - PREFECT_API_URL=http://prefect:4200/api
      - TZ=Asia/Karachi
      - PYTHONPATH=/app
    volumes:
      - ./src:/app/src                # Mount local model code
      - ./pipeline:/app/pipeline      # Mount local pipeline scripts
      - ./models:/app/models          # picks up new models without rebuild
      - ./results:/app/results        # serves latest_*.png graph files
      - ./artifacts:/app/artifacts    # reads latest_metrics.json + results.csv
      - ./frontend/dist:/app/frontend/dist # Sync built frontend for instant updates
